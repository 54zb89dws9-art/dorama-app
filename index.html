<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дорама Хаб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        
        .profile-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #111;
            cursor: pointer;
        }
        .profile-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        .profile-info { flex: 1; }
        .profile-name { font-weight: 700; font-size: 16px; }
        .profile-username { color: #888; font-size: 13px; }
        .profile-balance {
            background: #e94560;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }
        
        .tab-bar {
            display: flex;
            background: #111;
            padding: 4px;
            margin: 0 16px;
            border-radius: 12px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 6px;
            border: none;
            background: transparent;
            color: #888;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .tab-btn.active { background: #e94560; color: #fff; }
        
        .search-box { margin: 16px; }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
        }
        .search-box input::placeholder { color: #666; }
        
        .page { display: none; padding: 0 16px 100px; }
        .page.active { display: block; }
        
        .genre-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 0;
        }
        .genre-tag {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .genre-tag.active { background: #e94560; border-color: #e94560; color: #fff; }
        
        .dorama-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2a2a;
            position: relative;
        }
        .dorama-card .poster {
            font-size: 40px;
            text-align: center;
            margin-bottom: 10px;
        }
        .dorama-card .title { font-size: 17px; font-weight: 700; }
        .dorama-card .meta { color: #888; font-size: 12px; margin: 4px 0; }
        .dorama-card .desc { color: #aaa; font-size: 13px; margin: 8px 0; }
        
        .stars-row {
            display: flex;
            gap: 4px;
            cursor: pointer;
            margin: 8px 0;
        }
        .star {
            font-size: 20px;
            color: #333;
            transition: 0.2s;
        }
        .star.active { color: #ffd700; }
        .avg-rating { font-size: 13px; color: #ffd700; margin-left: 8px; }
        
        .review-box {
            margin-top: 8px;
        }
        .review-box textarea {
            width: 100%;
            padding: 8px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            resize: vertical;
        }
        .review-box button {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .reviews-list {
            margin-top: 8px;
            max-height: 150px;
            overflow-y: auto;
        }
        .review-item {
            padding: 8px;
            background: #111;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .review-user { color: #e94560; font-weight: 600; }
        .review-stars { color: #ffd700; }
        
        .episode-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .ep-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #4caf50;
            background: transparent;
            color: #4caf50;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .ep-btn.locked { border-color: #e94560; color: #e94560; }
        
        .dorama-buy-btn {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }
        
        .subscribe-banner {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            color: #000;
            text-align: center;
        }
        .subscribe-banner h3 { font-size: 18px; margin-bottom: 4px; }
        .subscribe-banner .price { font-size: 28px; font-weight: 800; }
        .subscribe-banner button {
            background: #000;
            color: #ffd700;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 15px;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .daily-bonus {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
        }
        .daily-bonus.claimed { opacity: 0.5; }
        
        .top-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ffd700;
            color: #000;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 11px;
        }
        
        .bookmark-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            cursor: pointer;
        }
        
        .profile-page-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 20px auto;
            font-weight: 700;
        }
        .profile-detail { text-align: center; margin-bottom: 20px; }
        
        .purchased-list {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
        }
        .purchased-item {
            padding: 10px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .admin-panel {
            background: #1a0a0a;
            border: 1px solid #e94560;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
        }
        .admin-panel h3 { color: #e94560; margin-bottom: 12px; }
        .admin-panel input, .admin-panel textarea, .admin-panel select {
            width: 100%;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .admin-panel button {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }
        
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            flex-direction: column;
        }
        .player-modal.active { display: flex; }
        .player-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
        }
        .close-player {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
        }
        .player-container { flex: 1; }
        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .share-btn {
            background: #4caf50;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            margin-top: 8px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="profile-bar" onclick="switchPage('profile')">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <div class="profile-info">
            <div class="profile-name" id="profileName">Загрузка...</div>
            <div class="profile-username" id="profileUsername">@username</div>
        </div>
        <div class="profile-balance">⭐ <span id="balanceTop">0</span></div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('catalog')">📺 Каталог</button>
        <button class="tab-btn" onclick="switchTab('top')">🏆 Топ</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 Поиск</button>
        <button class="tab-btn" onclick="switchTab('profile')">👤 Профиль</button>
    </div>

    <!-- КАТАЛОГ -->
    <div class="page active" id="page-catalog">
        <div class="daily-bonus" id="dailyBonus" onclick="claimDailyBonus()">
            🎁 Ежедневный бонус: +5 ⭐
        </div>
        <div class="subscribe-banner">
            <h3>👑 Доступ ко всем дорамам</h3>
            <div class="price">250 ⭐</div>
            <p style="font-size:13px;opacity:0.8;">навсегда</p>
            <button onclick="buySubscription()">Оформить подписку</button>
        </div>
        <div class="genre-bar" id="genreBar">
            <span class="genre-tag active" onclick="filterByGenre('all')">🔥 Все</span>
            <span class="genre-tag" onclick="filterByGenre('romance')">💕 Романтика</span>
            <span class="genre-tag" onclick="filterByGenre('fantasy')">🐉 Фэнтези</span>
            <span class="genre-tag" onclick="filterByGenre('historical')">👘 История</span>
            <span class="genre-tag" onclick="filterByGenre('comedy')">😂 Комедия</span>
            <span class="genre-tag" onclick="filterByGenre('drama')">🎭 Драма</span>
        </div>
        <div id="catalogContent"></div>
        
        <div class="admin-panel" id="adminPanel" style="display:none;">
            <h3>👑 Добавить дораму (админ)</h3>
            <input type="text" id="newTitle" placeholder="Название дорамы">
            <input type="text" id="newPoster" placeholder="Эмодзи (💄👑🗡️)">
            <select id="newGenre">
                <option value="romance">💕 Романтика</option>
                <option value="fantasy">🐉 Фэнтези</option>
                <option value="historical">👘 История</option>
                <option value="comedy">😂 Комедия</option>
                <option value="drama">🎭 Драма</option>
            </select>
            <input type="text" id="newYear" placeholder="Год">
            <input type="text" id="newRating" placeholder="Рейтинг (4.8)">
            <textarea id="newDesc" placeholder="Описание" rows="2"></textarea>
            <input type="text" id="newEp1" placeholder="Ссылка на 1 серию">
            <input type="text" id="newEp2" placeholder="Ссылка на 2 серию">
            <input type="number" id="newTotalEps" placeholder="Всего серий" value="16">
            <button onclick="addDorama()">✅ Добавить дораму</button>
        </div>
    </div>

    <!-- ТОП -->
    <div class="page" id="page-top">
        <h3 style="margin:16px 0;">🏆 Топ-10 дорам</h3>
        <div id="topContent"></div>
    </div>

    <!-- ПОИСК -->
    <div class="page" id="page-search">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию..." oninput="searchDoramas()">
        </div>
        <div id="searchResults"></div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="page" id="page-profile">
        <div class="profile-page-avatar" id="profileBigAvatar">👤</div>
        <div class="profile-detail">
            <h2 id="profileBigName">Имя</h2>
            <p style="color:#888;" id="profileBigUsername">@username</p>
            <p style="font-size:24px;font-weight:700;margin-top:8px;">⭐ <span id="profileBalance">0</span></p>
        </div>
        <button class="dorama-buy-btn" onclick="buyStars()">💎 Купить Stars</button>
        <button class="share-btn" onclick="shareApp()">📤 Пригласить друга (+20⭐)</button>
        
        <h3 style="margin-top:20px;">📺 Мои дорамы:</h3>
        <div class="purchased-list" id="purchasedList">
            <p style="color:#888;text-align:center;">Нет купленных дорам</p>
        </div>
        
        <h3 style="margin-top:20px;">🔖 Закладки:</h3>
        <div class="purchased-list" id="bookmarksList">
            <p style="color:#888;text-align:center;">Нет закладок</p>
        </div>
        
        <button style="background:transparent;border:1px solid #e94560;color:#e94560;padding:10px;border-radius:10px;width:100%;margin-top:10px;" onclick="toggleAdmin()">
            👑 Админ-панель
        </button>
    </div>

    <!-- ПЛЕЕР -->
    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <span id="playerTitle">Сейчас смотрит</span>
            <button class="close-player" onclick="closePlayer()">✕</button>
        </div>
        <div class="player-container" id="playerContainer"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let balance = 50;
        let purchasedDoramas = [];
        let bookmarks = [];
        let hasSubscription = false;
        let dailyClaimed = false;
        let currentFilter = 'all';

        const user = { firstName: 'Пользователь', username: 'username', photoUrl: '' };

        // База дорам с жанрами и отзывами
        let doramas = [
            {
                id: 1,
                title: 'Истинная красота',
                poster: '💄',
                year: 2020,
                rating: 4.8,
                genre: 'romance',
                description: 'Старшеклассница осваивает макияж и становится популярной',
                reviews: [
                    { user: 'Анна', stars: 5, text: 'Лучшая дорама! Пересматривала 3 раза!' },
                    { user: 'Вика', stars: 4, text: 'Очень смешная и трогательная' }
                ],
                episodes: [
                    { num: 1, url: 'https://vkvideo.ru/video-156580570_456247429' },
                    { num: 2, url: 'https://vkvideo.ru/video-156580570_456247420' },
                    { num: 3, url: '' }, { num: 4, url: '' }, { num: 5, url: '' },
                    { num: 6, url: '' }, { num: 7, url: '' }, { num: 8, url: '' },
                    { num: 9, url: '' }, { num: 10, url: '' }, { num: 11, url: '' },
                    { num: 12, url: '' }, { num: 13, url: '' }, { num: 14, url: '' },
                    { num: 15, url: '' }, { num: 16, url: '' }
                ]
            }
        ];

        function loadProfile() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                user.firstName = u.first_name || 'Пользователь';
                user.username = u.username || 'username';
                user.photoUrl = u.photo_url || '';
            }
            document.getElementById('profileAvatar').textContent = user.firstName[0] || '👤';
            document.getElementById('profileName').textContent = user.firstName;
            document.getElementById('profileUsername').textContent = '@' + user.username;
            document.getElementById('profileBigAvatar').textContent = user.firstName[0] || '👤';
            document.getElementById('profileBigName').textContent = user.firstName;
            document.getElementById('profileBigUsername').textContent = '@' + user.username;
        }

        function updateBalanceUI() {
            document.getElementById('balanceTop').textContent = balance;
            document.getElementById('profileBalance').textContent = balance;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            if (tab === 'catalog') renderCatalog();
            if (tab === 'top') renderTop();
            if (tab === 'profile') renderProfile();
        }

        function switchPage(page) { switchTab(page); }

        function filterByGenre(genre) {
            currentFilter = genre;
            document.querySelectorAll('.genre-tag').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderCatalog();
        }

        function getAverageRating(dorama) {
            if (!dorama.reviews || dorama.reviews.length === 0) return 0;
            const sum = dorama.reviews.reduce((acc, r) => acc + r.stars, 0);
            return (sum / dorama.reviews.length).toFixed(1);
        }

        function renderStars(rating, doramaId = null) {
            let html = '<span class="stars-row">';
            for (let i = 1; i <= 5; i++) {
                const active = i <= rating ? ' active' : '';
                html += `<span class="star${active}" ${doramaId ? `onclick="rateDorama(${doramaId}, ${i})"` : ''}>★</span>`;
            }
            html += `<span class="avg-rating">${rating}/5</span>`;
            html += '</span>';
            return html;
        }

        function renderCatalog() {
            const container = document.getElementById('catalogContent');
            const filtered = currentFilter === 'all' ? doramas : doramas.filter(d => d.genre === currentFilter);
            
            container.innerHTML = filtered.map((d, index) => {
                const purchased = purchasedDoramas.includes(d.id);
                const canWatch = hasSubscription || purchased;
                const avgRating = getAverageRating(d);
                const isBookmarked = bookmarks.includes(d.id);
                
                const epsHTML = d.episodes.map(ep => {
                    return `
                        <button class="ep-btn ${canWatch && ep.url ? '' : 'locked'}" 
                                onclick="watchEpisode(${d.id}, ${ep.num})">
                            С${ep.num} ${canWatch && ep.url ? '▶️' : '🔒'}
                        </button>
                    `;
                }).join('');

                const reviewsHTML = (d.reviews || []).map(r => `
                    <div class="review-item">
                        <span class="review-user">${r.user}</span>
                        <span class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
                        <br>${r.text}
                    </div>
                `).join('');

                return `
                    <div class="dorama-card">
                        ${index < 3 ? `<div class="top-badge">🔥 ТОП-${index + 1}</div>` : ''}
                        <span class="bookmark-btn" onclick="toggleBookmark(${d.id})">${isBookmarked ? '🔖' : '🏷️'}</span>
                        <div class="poster">${d.poster}</div>
                        <div class="title">${d.title}</div>
                        <div class="meta">⭐ ${d.rating} • ${d.episodes.length} серий • ${d.year}</div>
                        <div class="desc">${d.description}</div>
                        ${renderStars(avgRating, d.id)}
                        <div class="episode-row">${epsHTML}</div>
                        ${!canWatch ? `
                            <button class="dorama-buy-btn" onclick="buyDorama(${d.id})">🎬 Купить за 50 ⭐</button>
                        ` : `<p style="color:#4caf50;text-align:center;margin-top:8px;">✅ Доступ открыт</p>`}
                        
                        <div class="review-box">
                            <textarea id="reviewText_${d.id}" placeholder="Оставь отзыв..."></textarea>
                            <button onclick="addReview(${d.id})">📝 Отправить</button>
                        </div>
                        <div class="reviews-list">${reviewsHTML}</div>
                    </div>
                `;
            }).join('');
        }

        function renderTop() {
            const sorted = [...doramas].sort((a, b) => b.rating - a.rating).slice(0, 10);
            const container = document.getElementById('topContent');
            
            container.innerHTML = sorted.map((d, i) => `
                <div class="dorama-card">
                    <div class="top-badge">#${i + 1}</div>
                    <div class="poster">${d.poster}</div>
                    <div class="title">${d.title}</div>
                    <div class="meta">⭐ ${d.rating} • ${d.episodes.length} серий</div>
                    <div class="desc">${d.description}</div>
                    ${renderStars(getAverageRating(d))}
                    <button class="dorama-buy-btn" onclick="switchTab('catalog')">Смотреть</button>
                </div>
            `).join('');
        }

        function searchDoramas() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = document.getElementById('searchResults');
            if (!query) { results.innerHTML = '<p style="color:#888;text-align:center;">Введи название</p>'; return; }
            const filtered = doramas.filter(d => d.title.toLowerCase().includes(query));
            results.innerHTML = filtered.length === 0 
                ? '<p style="color:#888;text-align:center;">Ничего не найдено</p>'
                : filtered.map(d => `
                    <div class="dorama-card">
                        <div class="poster">${d.poster}</div>
                        <div class="title">${d.title}</div>
                        <div class="meta">⭐ ${d.rating} • ${d.episodes.length} серий</div>
                        <button class="dorama-buy-btn" onclick="switchTab('catalog')">Смотреть</button>
                    </div>
                `).join('');
        }

        function renderProfile() {
            const list = document.getElementById('purchasedList');
            if (hasSubscription) {
                list.innerHTML = '<p style="color:#ffd700;text-align:center;">👑 Подписка активна — все дорамы открыты!</p>';
            } else if (purchasedDoramas.length === 0) {
                list.innerHTML = '<p style="color:#888;text-align:center;">Нет купленных дорам</p>';
            } else {
                list.innerHTML = purchasedDoramas.map(id => {
                    const d = doramas.find(dd => dd.id === id);
                    return d ? `<div class="purchased-item">${d.poster} ${d.title}</div>` : '';
                }).join('');
            }
            
            const blist = document.getElementById('bookmarksList');
            if (bookmarks.length === 0) {
                blist.innerHTML = '<p style="color:#888;text-align:center;">Нет закладок</p>';
            } else {
                blist.innerHTML = bookmarks.map(id => {
                    const d = doramas.find(dd => dd.id === id);
                    return d ? `<div class="purchased-item">${d.poster} ${d.title}</div>` : '';
                }).join('');
            }
        }

        function watchEpisode(doramaId, epNum) {
            const dorama = doramas.find(d => d.id === doramaId);
            const episode = dorama.episodes.find(e => e.num === epNum);
            if (!hasSubscription && !purchasedDoramas.includes(doramaId)) {
                tg.showPopup({ title: 'Доступ закрыт', message: 'Купи дораму за 50⭐ или подписку за 250⭐', buttons: [{type: 'ok', text: 'Понятно'}] });
                return;
            }
            if (!episode.url) { tg.showAlert('🎬 Эта серия скоро появится!'); return; }
            document.getElementById('playerTitle').textContent = `${dorama.title} - Серия ${epNum}`;
            document.getElementById('playerContainer').innerHTML = `<iframe src="${episode.url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('playerModal').classList.add('active');
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('playerContainer').innerHTML = '';
        }

        function buyDorama(id) {
            const dorama = doramas.find(d => d.id === id);
            tg.showPopup({
                title: 'Покупка дорамы',
                message: `Купить "${dorama.title}" за 50 ⭐?`,
                buttons: [{id: 'buy', type: 'ok', text: 'Купить за 50⭐'}, {type: 'cancel'}]
            }, (btnId) => {
                if (btnId === 'buy') {
                    if (balance < 50) { tg.showAlert('❌ Недостаточно Stars!'); return; }
                    balance -= 50;
                    purchasedDoramas.push(id);
                    updateBalanceUI();
                    renderCatalog();
                    renderProfile();
                    tg.showAlert('✅ Дорама куплена!');
                }
            });
        }

        function buySubscription() {
            tg.showPopup({
                title: 'Подписка на всё',
                message: 'Доступ ко всем дорамам навсегда за 250 ⭐',
                buttons: [{id: 'buy', type: 'ok', text: 'Купить за 250⭐'}, {type: 'cancel'}]
            }, (btnId) => {
                if (btnId === 'buy') {
                    if (balance < 250) { tg.showAlert('❌ Недостаточно Stars!'); return; }
                    balance -= 250;
                    hasSubscription = true;
                    updateBalanceUI();
                    renderCatalog();
                    renderProfile();
                    tg.showAlert('✅ Подписка оформлена!');
                }
            });
        }

        function buyStars() {
            tg.showPopup({
                title: 'Купить Stars',
                message: 'Выбери пакет:',
                buttons: [
                    {id: '100', type: 'default', text: '100 ⭐'},
                    {id: '250', type: 'default', text: '250 ⭐'},
                    {id: '500', type: 'default', text: '500 ⭐'},
                    {type: 'cancel'}
                ]
            }, (btnId) => {
                if (btnId && btnId !== 'cancel') {
                    balance += parseInt(btnId);
                    updateBalanceUI();
                    tg.showAlert(`✅ Куплено ${btnId} Stars!`);
                }
            });
        }

        function claimDailyBonus() {
            if (dailyClaimed) { tg.showAlert('Уже получил бонус сегодня!'); return; }
            dailyClaimed = true;
            balance += 5;
            updateBalanceUI();
            document.getElementById('dailyBonus').classList.add('claimed');
            document.getElementById('dailyBonus').textContent = '✅ Бонус получен!';
            tg.showAlert('🎁 +5 Stars!');
        }

        function shareApp() {
            balance += 20;
            updateBalanceUI();
            tg.showAlert('📤 +20 Stars за приглашение друга!');
        }

        function toggleBookmark(id) {
            if (bookmarks.includes(id)) {
                bookmarks = bookmarks.filter(b => b !== id);
            } else {
                bookmarks.push(id);
            }
            renderCatalog();
            renderProfile();
        }

        function rateDorama(id, stars) {
            const dorama = doramas.find(d => d.id === id);
            if (!dorama.reviews) dorama.reviews = [];
            const existingReview = dorama.reviews.find(r => r.user === user.firstName);
            if (existingReview) {
                existingReview.stars = stars;
            } else {
                dorama.reviews.push({ user: user.firstName, stars: stars, text: '' });
            }
            renderCatalog();
            tg.showAlert(`⭐ Оценка ${stars}/5!`);
        }

        function addReview(id) {
            const text = document.getElementById('reviewText_' + id).value;
            if (!text) return;
            const dorama = doramas.find(d => d.id === id);
            if (!dorama.reviews) dorama.reviews = [];
            const existingReview = dorama.reviews.find(r => r.user === user.firstName);
            if (existingReview) {
                existingReview.text = text;
            } else {
                dorama.reviews.push({ user: user.firstName, stars: 5, text: text });
            }
            document.getElementById('reviewText_' + id).value = '';
            renderCatalog();
            tg.showAlert('📝 Отзыв добавлен!');
        }

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            switchTab('catalog');
        }

        function addDorama() {
            const title = document.getElementById('newTitle').value;
            if (!title) { tg.showAlert('Введи название!'); return; }
            
            const total = parseInt(document.getElementById('newTotalEps').value) || 16;
            const episodes = [];
            for (let i = 1; i <= total; i++) {
                episodes.push({
                    num: i,
                    url: i === 1 ? document.getElementById('newEp1').value : i === 2 ? document.getElementById('newEp2').value : ''
                });
            }
            
            doramas.push({
                id: Date.now(),
                title: title,
                poster: document.getElementById('newPoster').value || '🎬',
                year: document.getElementById('newYear').value || '2024',
                rating: document.getElementById('newRating').value || '4.5',
                genre: document.getElementById('newGenre').value,
                description: document.getElementById('newDesc').value || 'Описание',
                reviews: [],
                episodes: episodes
            });
            
            ['newTitle','newPoster','newDesc','newEp1','newEp2'].forEach(id => document.getElementById(id).value = '');
            renderCatalog();
            renderTop();
            tg.showAlert('✅ Дорама добавлена!');
        }

        // Старт
        loadProfile();
        updateBalanceUI();
        renderCatalog();
    </script>
</body>
</html>
