<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дорама Хаб</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #fff; min-height: 100vh; }
        
        .header { display: flex; align-items: center; gap: 12px; padding: 16px; background: #111; }
        .ava { width: 44px; height: 44px; border-radius: 50%; background: #e94560; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; }
        .info { flex: 1; }
        .name { font-weight: 700; font-size: 16px; }
        .uname { color: #888; font-size: 13px; }
        
        .tabs { display: flex; background: #111; padding: 4px; margin: 16px; border-radius: 12px; gap: 4px; }
        .tab { flex: 1; padding: 10px; border: none; background: transparent; color: #888; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .tab.active { background: #e94560; color: #fff; }
        
        .page { display: none; padding: 0 16px 100px; }
        .page.active { display: block; }
        
        .card { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #2a2a2a; }
        .card .poster { font-size: 45px; text-align: center; margin-bottom: 10px; }
        .card .title { font-size: 18px; font-weight: 700; }
        .card .meta { color: #888; font-size: 12px; margin: 4px 0; }
        .card .desc { color: #aaa; font-size: 13px; margin: 8px 0; }
        
        .eps { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .eps button { padding: 8px 12px; border-radius: 8px; border: 1px solid #4caf50; background: transparent; color: #4caf50; font-size: 12px; cursor: pointer; font-weight: 600; }
        .eps button.lock { border-color: #e94560; color: #e94560; }
        
        .donate-btn { background: linear-gradient(135deg, #ffd700, #ffaa00); border: none; color: #000; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: 700; cursor: pointer; font-size: 14px; }
        .open-btn { background: #4caf50; border: none; color: #fff; padding: 10px; border-radius: 10px; width: 100%; margin-top: 6px; font-weight: 700; cursor: pointer; font-size: 14px; }
        
        .search-box { margin: 16px 0; }
        .search-box input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 15px; }
        
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; }
        .player-modal.active { display: flex; }
        .player-top { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .player-close { background: #e94560; border: none; color: #fff; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; }
        .player-frame { flex: 1; }
        .player-frame iframe { width: 100%; height: 100%; border: none; }
        
        .admin-panel { background: #1a0a0a; border: 1px solid #e94560; border-radius: 16px; padding: 16px; margin-top: 16px; display: none; }
        .admin-panel h3 { color: #e94560; margin-bottom: 12px; }
        .admin-panel input, .admin-panel textarea, .admin-panel select { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 8px; font-size: 14px; }
        .admin-panel button { background: #e94560; border: none; color: #fff; padding: 10px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; }
        
        .review-input { width: 100%; padding: 8px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 12px; margin-top: 8px; resize: vertical; }
        .review-btn { background: #e94560; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; margin-top: 6px; cursor: pointer; font-size: 12px; }
        .review-list { max-height: 120px; overflow-y: auto; margin-top: 8px; }
        .review-item { padding: 6px 8px; background: #111; border-radius: 8px; margin-bottom: 4px; font-size: 12px; }
        .review-item b { color: #e94560; }
        .stars-row { display: flex; gap: 4px; margin: 8px 0; }
        .star { font-size: 22px; color: #333; cursor: pointer; }
        .star.on { color: #ffd700; }
    </style>
</head>
<body>

<div class="header">
    <div class="ava" id="ava">👤</div>
    <div class="info">
        <div class="name" id="uname">Гость</div>
        <div class="uname" id="uuser">@username</div>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="openTab('catalog')">📺 Каталог</button>
    <button class="tab" onclick="openTab('search')">🔍 Поиск</button>
</div>

<div class="page active" id="catalog">
    <p style="text-align:center;color:#ffd700;margin:12px 0;font-size:14px;">💛 Поддержи проект — отправь Stars на @drama_support</p>
    <div id="cat-list"></div>
    <div class="admin-panel" id="admin">
        <h3>👑 Добавить дораму</h3>
        <input id="a-title" placeholder="Название">
        <input id="a-poster" placeholder="Эмодзи (💄👑)">
        <input id="a-year" placeholder="Год">
        <input id="a-rating" placeholder="Рейтинг (4.8)">
        <textarea id="a-desc" placeholder="Описание" rows="2"></textarea>
        <input id="a-ep1" placeholder="Ссылка на 1 серию">
        <input id="a-ep2" placeholder="Ссылка на 2 серию">
        <input id="a-total" placeholder="Всего серий" value="16">
        <button onclick="addD()">✅ Добавить</button>
    </div>
</div>

<div class="page" id="search">
    <div class="search-box"><input id="s-input" placeholder="🔍 Поиск по названию..." oninput="doSearch()"></div>
    <div id="s-res"></div>
</div>

<div class="player-modal" id="player">
    <div class="player-top">
        <span id="p-title">Плеер</span>
        <button class="player-close" onclick="closePlayer()">✕</button>
    </div>
    <div class="player-frame" id="p-frame"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

let user = { name: 'Гость', uname: 'username' };

let dramas = [{
    id: 1, title: 'Истинная красота', poster: '💄', year: 2020, rating: 4.8,
    desc: 'Старшеклассница осваивает макияж и становится популярной',
    reviews: [{user:'Анна',stars:5,txt:'Лучшая дорама!'}],
    eps: [
        {n:1,url:'https://vkvideo.ru/video-156580570_456247429'},
        {n:2,url:'https://vkvideo.ru/video-156580570_456247420'},
        {n:3,url:''},{n:4,url:''},{n:5,url:''},{n:6,url:''},{n:7,url:''},{n:8,url:''},
        {n:9,url:''},{n:10,url:''},{n:11,url:''},{n:12,url:''},{n:13,url:''},{n:14,url:''},
        {n:15,url:''},{n:16,url:''}
    ]
}];

function loadUser() {
    if(tg.initDataUnsafe?.user) {
        user.name = tg.initDataUnsafe.user.first_name || 'Гость';
        user.uname = tg.initDataUnsafe.user.username || 'username';
    }
    document.getElementById('ava').textContent = user.name[0];
    document.getElementById('uname').textContent = user.name;
    document.getElementById('uuser').textContent = '@'+user.uname;
}

function openTab(t) {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    if(t==='catalog') renderCat();
}

function avgR(d) { return d.reviews.length ? (d.reviews.reduce((a,r)=>a+r.stars,0)/d.reviews.length).toFixed(1) : 0; }

function renderCat() {
    document.getElementById('cat-list').innerHTML = dramas.map(d=>{
        let ar = avgR(d);
        return `<div class="card">
            <div class="poster">${d.poster}</div>
            <div class="title">${d.title}</div>
            <div class="meta">⭐ ${d.rating} • ${d.eps.length} серий • ${d.year}</div>
            <div class="desc">${d.desc}</div>
            <div class="stars-row">${[1,2,3,4,5].map(i=>`<span class="star ${i<=ar?'on':''}" onclick="rate(${d.id},${i})">★</span>`).join('')} <span style="color:#ffd700;font-size:13px;">${ar}/5</span></div>
            <div class="eps">${d.eps.map(e=>`<button class="${e.url?'':'lock'}" onclick="play(${d.id},${e.n})">С${e.n} ${e.url?'▶️':'🔒'}</button>`).join('')}</div>
            <button class="donate-btn" onclick="donate()">💛 Поддержать проект</button>
            <textarea class="review-input" id="rt-${d.id}" placeholder="Оставь отзыв..."></textarea>
            <button class="review-btn" onclick="addRev(${d.id})">📝 Отправить</button>
            <div class="review-list">${(d.reviews||[]).map(r=>`<div class="review-item"><b>${r.user}</b> ${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}<br>${r.txt}</div>`).join('')}</div>
        </div>`;
    }).join('');
}

function doSearch() {
    let q = document.getElementById('s-input').value.toLowerCase();
    let f = dramas.filter(d=>d.title.toLowerCase().includes(q));
    document.getElementById('s-res').innerHTML = q ? (f.length ? f.map(d=>`<div class="card"><div class="poster">${d.poster}</div><div class="title">${d.title}</div><div class="meta">⭐ ${d.rating} • ${d.eps.length} серий</div><button class="open-btn" onclick="openTab('catalog')">Смотреть</button></div>`).join('') : '<p style="color:#888;text-align:center;">Ничего не найдено</p>') : '<p style="color:#888;text-align:center;">Введи название</p>';
}

function play(did, en) {
    let d = dramas.find(dd=>dd.id===did);
    let ep = d.eps.find(e=>e.n===en);
    if(!ep?.url) { tg.showAlert('🎬 Эта серия скоро появится!'); return; }
    document.getElementById('p-title').textContent = d.title+' - Серия '+en;
    document.getElementById('p-frame').innerHTML = '<iframe src="'+ep.url+'" allow="autoplay;fullscreen" allowfullscreen></iframe>';
    document.getElementById('player').classList.add('active');
}
function closePlayer() { document.getElementById('player').classList.remove('active'); document.getElementById('p-frame').innerHTML=''; }

function donate() {
    tg.openTelegramLink('https://t.me/drama_support');
    tg.showAlert('💛 Спасибо за поддержку!');
}

function rate(id,s) {
    let d=dramas.find(dd=>dd.id===id);
    let r=d.reviews.find(rr=>rr.user===user.name);
    if(r) r.stars=s; else d.reviews.push({user:user.name,stars:s,txt:''});
    renderCat(); tg.showAlert('⭐ Оценка '+s+'/5!');
}
function addRev(id) {
    let txt=document.getElementById('rt-'+id).value; if(!txt) return;
    let d=dramas.find(dd=>dd.id===id);
    let r=d.reviews.find(rr=>rr.user===user.name);
    if(r) r.txt=txt; else d.reviews.push({user:user.name,stars:5,txt:txt});
    document.getElementById('rt-'+id).value=''; renderCat(); tg.showAlert('📝 Отзыв добавлен!');
}

// Админка (открывается из консоли браузера командой: toggleAdmin())
function toggleAdmin() {
    let p=document.getElementById('admin');
    p.style.display=p.style.display==='none'?'block':'none';
}
function addD() {
    let t=document.getElementById('a-title').value; if(!t) { tg.showAlert('Введи название!'); return; }
    let ep=[], total=parseInt(document.getElementById('a-total').value)||16;
    for(let i=1;i<=total;i++) ep.push({n:i,url:i===1?document.getElementById('a-ep1').value:i===2?document.getElementById('a-ep2').value:''});
    dramas.push({id:Date.now(),title:t,poster:document.getElementById('a-poster').value||'🎬',year:document.getElementById('a-year').value||'2024',rating:document.getElementById('a-rating').value||'4.5',desc:document.getElementById('a-desc').value||'Описание',reviews:[],eps:ep});
    ['a-title','a-poster','a-desc','a-ep1','a-ep2'].forEach(x=>document.getElementById(x).value='');
    renderCat(); tg.showAlert('✅ Добавлено!');
}

loadUser(); renderCat();
</script>
</body>
</html>
