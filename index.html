<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="telegram-webapp-bg-color" content="#0a0a0f">
    <meta name="telegram-webapp-header-color" content="#111118">
    <title>50/50 - Игра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body {
            background: #0a0a0f;
            background-image: radial-gradient(ellipse at 50% 0%, #1a1a30 0%, #0a0a0f 70%);
            color: #fff;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(160deg, #1a1030 0%, #0a0a0f 50%, #100a15 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 0.5s;
        }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-5px); } }
        @keyframes glow { 0%,100% { text-shadow: 0 0 20px rgba(255,71,87,0.5); } 50% { text-shadow: 0 0 50px rgba(255,71,87,0.9); } }
        
        .container { max-width: 400px; margin: 0 auto; padding: 16px; }
        
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; background: #14141f; border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.06); margin-bottom: 16px;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .ava {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px;
        }
        .name { font-weight: 700; font-size: 15px; }
        .uname { color: #7a7a8a; font-size: 11px; }
        .balance-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000; padding: 10px 16px; border-radius: 14px;
            font-weight: 800; font-size: 14px;
        }
        
        .banner {
            background: rgba(255,71,87,0.1); border-radius: 18px; padding: 20px;
            text-align: center; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.06);
        }
        .banner h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .banner p { color: #7a7a8a; font-size: 13px; }
        
        .dice-area {
            background: #14141f; border-radius: 24px; padding: 30px 20px;
            text-align: center; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.06);
        }
        .dice-number {
            font-size: 72px; font-weight: 900; min-height: 100px;
            display: flex; align-items: center; justify-content: center;
        }
        .dice-label { color: #7a7a8a; font-size: 13px; margin-bottom: 8px; }
        @keyframes roll {
            0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); }
        }
        .rolling { animation: roll 0.6s ease-in-out; }
        .win-number { color: #2ed573; }
        .lose-number { color: #ff4757; }
        
        .bet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
        .bet-btn {
            padding: 12px 8px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);
            background: #14141f; color: #aaa; font-weight: 700;
            cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .bet-btn.active { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; border-color: #ffd700; }
        .bet-btn:active { transform: scale(0.94); }
        
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .choice-btn {
            padding: 18px; border-radius: 18px; border: 2px solid rgba(255,255,255,0.08);
            background: #14141f; color: #fff; font-weight: 800;
            cursor: pointer; font-size: 18px; transition: 0.2s; text-align: center;
        }
        .choice-btn:active { transform: scale(0.95); }
        .choice-btn.even { border-color: #2ed573; }
        .choice-btn.odd { border-color: #ff4757; }
        .choice-btn:disabled { opacity: 0.4; pointer-events: none; }
        
        .history {
            background: #14141f; border-radius: 18px; padding: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .history h3 { font-size: 14px; margin-bottom: 10px; color: #7a7a8a; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
        }
        .history-win { color: #2ed573; }
        .history-lose { color: #ff4757; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .action-btn {
            padding: 14px; border-radius: 14px; border: none; font-weight: 700;
            cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.94); }
        .withdraw-btn { background: #2ed573; color: #000; }
        .donate-btn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
    </style>
</head>
<body>

<div id="splash">
    <div style="font-size:70px;animation:bounce 1.5s ease-in-out infinite;">🎲</div>
    <div style="font-size:30px;font-weight:900;color:#fff;margin-top:16px;letter-spacing:2px;animation:glow 2s ease-in-out infinite;">50 / 50</div>
    <div style="color:#ff4757;font-size:14px;margin-top:8px;">Испытай удачу!</div>
</div>

<div class="container">
    <div class="header">
        <div class="user-info">
            <div class="ava" id="ava">👤</div>
            <div>
                <div class="name" id="uname">Игрок</div>
                <div class="uname" id="uuser">@user</div>
            </div>
        </div>
        <div class="balance-badge">⭐ <span id="balance">100</span></div>
    </div>

    <div class="banner">
        <h2>🎲 Угадай ЧЁТ / НЕЧЕТ</h2>
        <p>Выиграй x2 от ставки! Шанс 50%</p>
    </div>

    <div class="dice-area">
        <div class="dice-label">Случайное число от 1 до 100</div>
        <div class="dice-number" id="dice">🎲</div>
    </div>

    <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#7a7a8a;">Ставка:</div>
    <div class="bet-grid" id="betGrid">
        <button class="bet-btn" data-bet="10">10⭐</button>
        <button class="bet-btn active" data-bet="25">25⭐</button>
        <button class="bet-btn" data-bet="50">50⭐</button>
        <button class="bet-btn" data-bet="100">100⭐</button>
    </div>

    <div class="choice-grid">
        <button class="choice-btn even" id="btnEven" onclick="play('even')">🟢 ЧЁТ</button>
        <button class="choice-btn odd" id="btnOdd" onclick="play('odd')">🔴 НЕЧЕТ</button>
    </div>

    <div class="history">
        <h3>📋 История игр</h3>
        <div id="historyList">
            <div style="color:#7a7a8a;text-align:center;font-size:12px;">Пока нет игр</div>
        </div>
    </div>

    <div class="action-grid">
        <button class="action-btn withdraw-btn" onclick="withdraw()">💸 Вывести</button>
        <button class="action-btn donate-btn" onclick="donate()">💛 Поддержать</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

let balance = 100;
let selectedBet = 25;
let history = [];
let playing = false;
let user = { name: 'Игрок', uname: 'user' };

// Заставка
setTimeout(function(){
    var s = document.getElementById('splash');
    if(s) { s.style.opacity = '0'; s.style.pointerEvents = 'none'; setTimeout(function(){ if(s) s.style.display = 'none'; }, 500); }
}, 1800);

function loadUser() {
    if(tg.initDataUnsafe?.user) {
        user.name = tg.initDataUnsafe.user.first_name || 'Игрок';
        user.uname = tg.initDataUnsafe.user.username || 'user';
    }
    document.getElementById('ava').textContent = user.name[0] || '👤';
    document.getElementById('uname').textContent = user.name;
    document.getElementById('uuser').textContent = '@'+user.uname;
}

function updateBalance() { document.getElementById('balance').textContent = balance; }

document.querySelectorAll('.bet-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        selectedBet = parseInt(this.dataset.bet);
    };
});

function play(choice) {
    if(playing) return;
    if(balance < selectedBet) {
        tg.showAlert('❌ Недостаточно Stars!');
        return;
    }
    
    playing = true;
    document.getElementById('btnEven').disabled = true;
    document.getElementById('btnOdd').disabled = true;
    
    balance -= selectedBet;
    updateBalance();
    
    var dice = document.getElementById('dice');
    dice.classList.add('rolling');
    dice.textContent = '🎲';
    dice.className = 'dice-number rolling';
    
    setTimeout(function(){
        var num = Math.floor(Math.random() * 100) + 1;
        var isEven = num % 2 === 0;
        var win = (choice === 'even' && isEven) || (choice === 'odd' && !isEven);
        
        dice.classList.remove('rolling');
        dice.textContent = num;
        
        if(win) {
            var prize = selectedBet * 2;
            balance += prize;
            dice.className = 'dice-number win-number';
            history.unshift({ num: num, choice: choice, win: true, bet: selectedBet, prize: prize });
            tg.showAlert('🎉 Выиграл +'+prize+' ⭐!');
        } else {
            dice.className = 'dice-number lose-number';
            history.unshift({ num: num, choice: choice, win: false, bet: selectedBet });
            tg.showAlert('😞 Не повезло! -'+selectedBet+' ⭐');
        }
        
        updateBalance();
        updateHistory();
        playing = false;
        document.getElementById('btnEven').disabled = false;
        document.getElementById('btnOdd').disabled = false;
    }, 700);
}

function updateHistory() {
    var list = document.getElementById('historyList');
    if(history.length === 0) {
        list.innerHTML = '<div style="color:#7a7a8a;text-align:center;font-size:12px;">Пока нет игр</div>';
        return;
    }
    list.innerHTML = history.slice(0, 10).map(h => {
        return `<div class="history-item">
            <span>🎲 ${h.num} (${h.choice === 'even' ? 'Чёт' : 'Нечет'})</span>
            <span class="${h.win ? 'history-win' : 'history-lose'}">${h.win ? '+'+h.prize : '-'+h.bet} ⭐</span>
        </div>`;
    }).join('');
}

function withdraw() {
    tg.openTelegramLink('https://t.me/niklove666');
    tg.showAlert('💸 Для вывода напиши мне @niklove666');
}

function donate() {
    tg.openTelegramLink('https://t.me/niklove666');
    tg.showAlert('💛 Спасибо за поддержку!');
}

loadUser();
updateBalance();
</script>
</body>
</html>
